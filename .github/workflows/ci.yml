name: CI - Integração Contínua

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Permite execução manual no painel do GitHub
  schedule:
    - cron: '0 0 * * *' # Execução agendada diariamente à meia-noite (UTC)

jobs:
  build-and-test:
    name: Build, Test and Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Atualizado para Node.js v22 (LTS estável) para máxima compatibilidade e sem deprecations
          cache: 'npm'

      - name: Instalar Dependências
        run: npm ci # Instalador limpo e otimizado para pipelines de CI (utiliza o package-lock.json)

      - name: Executar Testes e Gerar Relatório
        run: npm run test:report

      - name: Upload do Relatório de Testes (Artefato)
        uses: actions/upload-artifact@v4
        if: always() # Garante que o relatório seja salvo mesmo se algum teste falhar
        with:
          name: relatorio-de-testes
          path: mochawesome-report/
          retention-days: 30
